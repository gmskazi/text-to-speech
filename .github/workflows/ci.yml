name: CI

on:
  push:
    branches: ["**"]
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".github/workflows/ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect docker-related changes
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            docker:
              - 'Dockerfile'
              - 'app/**'
              - 'pyproject.toml'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install ffmpeg
        run: sudo apt-get update && sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          pip install pip-audit

      - name: Compile smoke check
        run: python -m compileall app tests

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app tests

      - name: Tests
        run: pytest -q

      - name: Dependency audit
        run: pip-audit

      - name: Docker build smoke test
        if: steps.changes.outputs.docker == 'true'
        run: docker build -t text-to-speech-ci .
